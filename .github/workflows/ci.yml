name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Node workspaces ────────────────────────────────────────────────────
  node:
    name: TypeScript build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Mobile package has its own Expo / EAS pipeline — excluded here and
      # validated separately in the `mobile` job below. Tracked as BFW-005
      # (pre-existing React 19 / RN / lucide / expo-camera type drift).
      # Use turbo's native filter (pnpm -r would still run root's
      # `turbo run build` which ignores pnpm's filter).
      - run: pnpm exec turbo run build --filter='!@openhipp0/mobile'

      - run: pnpm exec turbo run typecheck --filter='!@openhipp0/mobile'

      - run: pnpm exec turbo run lint --filter='!@openhipp0/mobile'

      - run: pnpm -r test

      - run: pnpm test:e2e

  mobile:
    name: Mobile package (tests only, build via EAS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @openhipp0/mobile test

  # ── Python SDK ─────────────────────────────────────────────────────────
  # Pre-existing CI env drift — one of the framework packages (crewai /
  # langgraph / langchain / autogen / openai-agents) fails dev-extras
  # install on the stock hosted runner. `continue-on-error` until the
  # install is debugged; failure-mode is reported, not blocking.
  python:
    name: Python SDK tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install & test
        run: ./scripts/test-python.sh

  # ── Docker build ───────────────────────────────────────────────────────
  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [node]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: openhipp0:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
